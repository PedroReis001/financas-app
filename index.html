<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Minhas Finanças</title>

  <!-- PWA: instalação no iOS exige manifest + apple-touch-icon + meta tags abaixo -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1C1B19">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===================== TELA DE LOGIN ===================== -->
  <main id="tela-login" class="tela" hidden>
    <div class="cartao-login">
      <div class="marca">
        <span class="marca-cifra">R$</span>
        <span class="marca-nome">Minhas Finanças</span>
      </div>

      <form id="form-login" class="form-login">
        <label for="email">Seu e-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="voce@email.com"
          autocomplete="email"
          required
        >
        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          name="senha"
          autocomplete="current-password"
          required
        >
        <button type="submit">Entrar</button>
      </form>

      <p id="status-login" class="status-login" role="status" aria-live="polite"></p>
    </div>
  </main>

  <!-- ===================== APP PRINCIPAL ===================== -->
  <main id="tela-app" class="tela" hidden>
    <header class="cabecalho">
      <div class="cabecalho-topo">
        <span class="marca-cifra-pequena">R$</span>
        <button id="botao-sair" class="botao-texto">Sair</button>
      </div>
      <div class="saldo">
        <span class="saldo-rotulo">Saldo do mês</span>
        <span id="saldo-valor" class="saldo-valor">R$ 0,00</span>
      </div>
    </header>

    <div class="resumo">
      <div class="resumo-card">
        <div class="resumo-rotulo"><span class="resumo-icone entrada">↓</span> Receitas</div>
        <div id="total-receitas" class="resumo-valor entrada">0,00</div>
      </div>
      <div class="resumo-card">
        <div class="resumo-rotulo"><span class="resumo-icone saida">↑</span> Despesas</div>
        <div id="total-despesas" class="resumo-valor saida">0,00</div>
      </div>
    </div>

    <form id="form-lancamento" class="form-lancamento">
      <div class="seletor-tipo">
        <button type="button" class="tipo-botao tipo-ativo" data-kind="expense">− Gasto</button>
        <button type="button" class="tipo-botao" data-kind="income">+ Entrada</button>
      </div>
      <div class="form-linha">
        <input id="campo-valor" class="campo-valor" inputmode="decimal" placeholder="0,00" autocomplete="off" required>
        <input id="campo-descricao" class="campo-descricao" placeholder="Descrição" autocomplete="off">
      </div>
      <select id="campo-categoria" class="campo-categoria" aria-label="Categoria"></select>
      <div class="form-linha">
        <input id="campo-data" class="campo-data" type="date" required>
        <button type="submit" class="botao-adicionar">Adicionar</button>
      </div>
      <p id="status-lancamento" class="status-lancamento" role="status" aria-live="polite"></p>
    </form>

    <section class="lista-lancamentos">
      <h2 class="lista-titulo">Lançamentos</h2>
      <ul id="lista" class="lista"></ul>
      <div id="estado-vazio" class="estado-vazio">
        <p class="estado-vazio-titulo">Nenhum lançamento ainda</p>
        <p class="estado-vazio-texto">Adicione seu primeiro lançamento acima.</p>
      </div>
    </section>
  </main>

  <!-- Configuração do projeto Supabase (URL + chave anônima) -->
  <script src="config.js"></script>
  <!-- Cliente Supabase (UMD via CDN, sem precisar de npm/build) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
